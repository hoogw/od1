<!DOCTYPE html>
<html>
  <head>
    <title id="title">feature layer</title>
    <link rel="icon" href="../../favicon.ico" type="image/x-icon">

    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" charset='utf-8' content="initial-scale=1.0, width=device-width"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <link href="../../css/mobile.css" rel="stylesheet" type="text/css"/>
    
   

</head>

<body>
               
 
 <div class='flex-container'>


  <div>
      <span id="layer-info-vertical">Layer Name</span>
      <small>total:</small><b id="total-feature">...</b>
      <small>visible:</small><b id="feature-on-map">...</b>
      <span id="lat-lng-zoom" hidden>...</span>
      <div id="radio-basemap-id" style="font-size: xx-small;" hidden></div>
    
      <button type="button" id = "panToCurrent_geolocation_button">my-location</button>
      <!--   --- --- --- --- back to previous extent --- --- --- --- -->
      <button type='button' id='zoom2layer_button'>show-layer</button>
      <button type='button' id='full_extent_btn'>whole-layer</button>
      <!--   --- --- end --- --- back to previous extent --- --- --- ---  -->

      <small id = "opacitytitle_span">layer-opacity:</small>
      <b id='opacity_value_text'></b>
      <input type='range' id='overlay_opacity_range' name='overlay_opacity_range' min="0" max="10"/>
  </div>

  <div class='flex-2-top'>
    <arcgis-map popup-disabled id="map-components-id" basemap="hybrid">
    </arcgis-map>
  </div>
        

      
       
  <div class='flex-2-bottom'>
        <!-- find address must be at last bottom, otherwise its drop down will conflict with other component below  -->
        <arcgis-search reference-element="map-components-id" style="z-index:99;" class="calcite-mode-dark">
        </arcgis-search> 

        <div id='info-window-div' class='flex-row'></div>
  <div>
    




  </div>

     
 <script src="../../js/lib/papaparse.js" type="text/javascript"></script>
 

   
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
   
     
    
     
    <script src="../../js/map/share/common-share.js"></script>
    <script src="../../js/map/share/arcgis-component.js" type="text/javascript"></script>
    <script type="module" src="../../js/map/share/arcgis-component-import.js" type="text/javascript"></script>
    <script src="../../js/map/esri/image-server.js" type="text/javascript"></script>

  </body>
</html>
