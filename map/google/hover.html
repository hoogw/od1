<!DOCTYPE html>
<html>

<head>
    <title id="title">layer name</title>
    <link rel="icon" href="../../favicon.ico" type="image/x-icon">
    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" charset='utf-8' content="initial-scale=1.0, width=device-width"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    
     <link href="../../css/mobile.css" rel="stylesheet" type="text/css"/>
    
    

</head>

<body>

  
  <div class='flex-container'>

    <div>
      <span id="layer-info-vertical">Layer Name</span>
      <small>visible:</small><b id="feature-on-map">...</b>
      <small>total:</small><b id="total-feature">...</b>
      <span id="lat-lng-zoom" hidden>...</span>

      <button type="button" id = "panToCurrent_geolocation_button">my-location</button>
      <button type="button" id = "zoomToLayer_button">show-layer</button>
      <small id = "opacitytitle_span">layer-opacity:</small>
      <input type='range' id='overlay_opacity_range' name='overlay_opacity_range' min="0" max="10"></input>
      <b id='overlay_opacity_label'></b>
    </div> 

    <div id="map" class='flex-2-top'>
    </div>
      
    <div class='flex-2-bottom'>
      <!-- input id='pac-input' type='search' placeholder='(google) addr. zip Pl.'/ -->  
      <gmp-basic-place-autocomplete style="height: 25px;" slot="control-inline-start-block-start"></gmp-basic-place-autocomplete>
      <gmp-place-details-compact hidden>
            <gmp-place-details-place-request hidden></gmp-place-details-place-request>
            <gmp-place-standard-content hidden></gmp-place-standard-content>
      </gmp-place-details-compact>
          
      <div id='info-window-div' class='flex-row'></div>
      
    </div>

  </div>

      
      
  <script src="../../js/lib/stack.js"></script>

  
  <script src="../../js/lib/proj4/dist/proj4.js"></script>
  <script src="../../js/lib/wkt.js"></script>
  <script src="../../js/lib/reproject/dist/reproject.js"></script>
  <script src="../../js/lib/wellknown/wellknown.js"></script>

  <!-- 2022 works <script src="../../js/lib/terraformer/terraformer@2.2.1-arcgis.js"></script> -->
  <script src="../../js/lib/terraformer/terraformer@2.1.2-arcgis.js"></script>
  <!-- CDN works <script src="https://unpkg.com/@terraformer/arcgis"></script>  -->
  <script src="../../js/lib/arcgis-to-geojson-utils/dist/arcgis-to-geojson.js"></script>
  <script   src="../../js/lib/turf/turf.min.js"></script>
      
  <script src="../../js/map/share/common-share.js"></script>

  <script src="../../js/map/share/google-for-all.js" type="text/javascript"></script>
  <!-- default.js must load befor common_share.js -->
  <script src="../../js/map/google/hover/default.js" type="text/javascript"></script>
  <script src="../../js/map/google/hover/helper.js" type="text/javascript"></script>
  <script src="../../js/map/google/hover/common_share.js" type="text/javascript"></script>


  </body>
</html>
